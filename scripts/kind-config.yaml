## kind cluster config for local KubePilot development.
## Creates a 1-control-plane + 2-worker cluster that simulates a real environment.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kubepilot-dev
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "kubepilot.io/role=control-plane"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "kubepilot.io/role=worker"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "kubepilot.io/role=worker"
