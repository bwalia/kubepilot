## ─────────────────────────────────────────────────────────────────────────────
## KubePilot – example configuration file
## Copy to config.yaml or $HOME/.kubepilot/config.yaml and customize.
##
## Environment variable overrides (prefix: KUBEPILOT_):
##   KUBEPILOT_OLLAMA_BASE_URL=http://localhost:11434/v1
##   KUBEPILOT_OLLAMA_API_KEY=<only needed if Ollama is behind an auth proxy>
##   KUBEPILOT_OLLAMA_MODEL=llama3
##   KUBEPILOT_LOG_LEVEL=debug
##   KUBEPILOT_MCP_PORT=9090
##   KUBEPILOT_DASHBOARD_AUTH_ENABLED=true
##   KUBEPILOT_DASHBOARD_AUTH_TOKEN=<strong-random-token>
##   KUBEPILOT_DASHBOARD_AUTH_USERNAME=admin
##   KUBEPILOT_DASHBOARD_AUTH_PASSWORD=<strong-password>
##   KUBEPILOT_ENABLE_KUBECONFIG_MUTATIONS=false
##   KUBEPILOT_ENABLE_ACTION_MUTATIONS=false
##   KUBEPILOT_CORS_ALLOWED_ORIGINS=http://localhost:8383,http://127.0.0.1:8383
## ─────────────────────────────────────────────────────────────────────────────

# Path to kubeconfig. Leave empty to use in-cluster config when running inside a pod.
# kubeconfig: ~/.kube/config

# Logging level: debug | info | warn | error
log_level: info

# MCP server port (used by remote agents).
mcp_port: 9090

# Kubernetes Cockpit dashboard port.
dashboard_port: 9080

# Ollama configuration.
# ollama_base_url defaults to http://localhost:11434/v1 — override for remote instances.
# ollama_api_key is optional (only needed if Ollama is behind an auth proxy).
ollama_base_url: "http://localhost:11434/v1"
ollama_model: llama3

# Security settings for dashboard/API.
#
# Auth supports either:
#  1) Bearer token auth (dashboard_auth_token)
#  2) Basic auth (dashboard_auth_username + dashboard_auth_password)
#
# Keep disabled for local-only dev; enable for any network-accessible deployment.
dashboard_auth_enabled: false
dashboard_auth_token: ""
dashboard_auth_username: ""
dashboard_auth_password: ""

# Mutation endpoint controls (default secure posture: disabled).
# - enable_kubeconfig_mutations: upload/add/switch kubeconfig APIs
# - enable_action_mutations: AI execute-action + remediate APIs
enable_kubeconfig_mutations: false
enable_action_mutations: false

# Comma-separated list of allowed browser origins for CORS.
# Leave default for local UI, set explicitly for remote deployments.
cors_allowed_origins: "http://localhost:8383,http://127.0.0.1:8383"

# Operator settings.
operator:
  metrics_addr: ":8081"
  health_probe_addr: ":8082"
  leader_elect: true

# Agent settings (when running in remote cluster mode).
agent:
  mcp_server: ""      # host:port of the central MCP server
  cluster_name: ""    # Unique name for this cluster
