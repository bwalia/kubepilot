{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubepilot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubepilot.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow dashboard and MCP traffic from anywhere in the cluster.
    - ports:
        - port: {{ .Values.service.dashboardPort }}
          protocol: TCP
        - port: {{ .Values.service.mcpPort }}
          protocol: TCP
  egress:
    # Allow DNS resolution.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS to Kubernetes API server.
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Allow HTTP to Ollama.
    - ports:
        - port: 11434
          protocol: TCP
{{- end }}
