name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      - name: Build kubepilot binary
        run: go build -o dist/kubepilot ./cmd/kubepilot

      - name: Verify binary runs
        run: |
          ./dist/kubepilot --help
          ./dist/kubepilot troubleshoot --help
          ./dist/kubepilot rca --help
          ./dist/kubepilot watch --help
          ./dist/kubepilot serve --help

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Display coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
