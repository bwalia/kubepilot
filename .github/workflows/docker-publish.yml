name: Publish Docker Image

# Publishes multi-arch KubePilot images to both Docker Hub and GHCR.
#
# Triggers:
#   - Push to master → tags: latest, master-<sha>
#   - Git tag v*     → tags: <version>, <major.minor>, <major>, latest
#   - Manual dispatch → tag: manual-<sha>
#
# Required repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub account/org
#   DOCKERHUB_TOKEN    — Docker Hub access token (not a password)
# GHCR uses the built-in GITHUB_TOKEN; no extra secret needed.

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # required to push to ghcr.io

jobs:
  publish:
    name: Build & Publish (multi-arch)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: dh
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [[ -n "$DH_USER" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.dh.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image repository names
        id: repos
        run: |
          # Docker Hub: <DOCKERHUB_USERNAME>/kubepilot (fall back to skip if secret missing)
          DH_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          if [[ -n "$DH_USER" ]]; then
            echo "dockerhub=${DH_USER}/kubepilot" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=" >> "$GITHUB_OUTPUT"
          fi
          # GHCR: ghcr.io/<owner>/kubepilot (lowercase)
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ghcr=ghcr.io/${OWNER_LC}/kubepilot" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.repos.outputs.dockerhub }}
            ${{ steps.repos.outputs.ghcr }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=master-,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=KubePilot
            org.opencontainers.image.description=AI-powered Kubernetes management platform
            org.opencontainers.image.vendor=KubePilot
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
